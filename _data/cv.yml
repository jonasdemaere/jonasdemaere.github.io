  sections:
    Experience:
      - company: Vintaflow
        position: CEO / Founder
        location: Austin, TX
        url: https://vintaflow.com
        start_date: 2025
        end_date: present
        highlights:
          - Founded and bootstrapped Vintaflow, a SaaS supply chain platform for the alcoholic beverage industry, from concept to commercial launch—achieving early market traction and revenue without external funding.
          - Defined and executed the go-to-market strategy, securing strategic customers and partnerships across the U.S. and Europe, including producers, importers, and freight forwarders.
          - Led product vision and cross-functional teams to deliver enterprise-grade forecasting and inventory optimization tools, driving measurable reductions in inventory costs and supply chain inefficiencies.

      - company: Ahold Delhaize USA
        position: Sourcing Manager – Wine, Private Brands, Special Projects
        location: ME & NC
        start_date: 2019
        end_date: 2025
        highlights:
          - Managed teams up to four direct reports engaged in sourcing of categories such as beverage, wine, frozen, and edible grocery.
          - In charge of sourcing strategies and negotiation tactics for 5 different supermarket chains for a total of 2,200 stores.
          - Functional areas involved: vendor selection, cost negotiation, forecasting, private brand development, pricing, and promotion.

      - company: Delhaize
        position: Head of Wine Buying Department / Category Manager Wine
        location: Belgium
        start_date: 2016
        end_date: 2019
        highlights:
          - Promoted within 6 months of joining to leading a team with 3 direct and 10 indirect reports sourcing over €200 million annually.
          - In charge of negotiation, item sourcing, private brand development, and category performance.
          - Responsible for the P&L, commercial plan, supply chain, replenishment, and merchandising.
          - Forerunner in the integration between Ahold and Delhaize after the merger.

      - company: Wine in Moderation AISBL
        position: Strategy Consultant
        location: Belgium
        start_date: 2015
        end_date: 2016
        highlights:
          - Strategic development: identification of assessment tools, strategic objectives, operational frameworks, and budgets.
          - Built relationships with national federations, European institutions, and multinational corporations.
          - Implemented training pilot programs.

      - company: Belgian Wines Ltd.
        position: General Manager and Member of the Board
        location: Belgium
        start_date: 2007
        end_date: 2019
        highlights:
          - Executive family member of a wine business with focus on distribution, ecommerce, and retail.
          - Involved in finance, accounting, business development, sourcing, and merchandising.
          - Developed a strategic plan around B2C focus through retail outlets and direct to consumer sales.

      - company: University of Antwerp, Department of Accounting and Finance
        position: Research Assistant in Corporate Governance
        location: Antwerp, Belgium
        start_date: 2009
        end_date: 2013
        highlights:
          - Conducted research on corporate governance in an international setting and disseminated findings to policy makers, industry representatives, trade associations, regulators, and media.
          - Acquired extensive knowledge on the functioning of boards of directors and management committees, with emphasis on internal board processes and the interaction between directors and executives.
          - Developed a strong understanding of compliance, enterprise risk management, and the implications of strategy on firm-level outcomes.

